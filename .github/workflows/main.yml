name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # schedule:
  #   - cron: '* * * * *'
  #? minute - hour - day - month - day of week
jobs:
  setup:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Install Playwright Browsers
      #   run: pnpm playwright install --with-deps

  tests:
    name: ${{ matrix.topic }}
    needs: setup
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        include:
          - topic: demoqa
            paths: tests/demoqa*.spec.ts
          - topic: github-repository
            paths: tests/github/repository
          - topic: todo
            paths: tests/form.spec.ts tests/todo-basic-flow.spec.ts
          - topic: smoke
            paths: tests/seed.spec.ts tests/test.spec.ts
    env:
      PW_REPORT_TOPIC: ${{ matrix.topic }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Install Playwright Browsers
      #   run: pnpm playwright install --with-deps
      - name: Run ${{ matrix.topic }} Playwright tests
        run: pnpm exec playwright test ${{ matrix.paths }} --project chromium-ci --reporter=github,blob,list

      - name: Build ${{ matrix.topic }} reports
        if: always()
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/reports/${{ matrix.topic }}.json
        run: pnpm exec playwright merge-reports --reporter=json,html blob-report

      - name: Add ${{ matrix.topic }} summary
        if: always()
        run: node scripts/playwright-summary.js topic --topic "${{ matrix.topic }}" --report "test-results/reports/${{ matrix.topic }}.json" --html-artifact "playwright-html-report-${{ matrix.topic }}"

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report-${{ matrix.topic }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-json-report-${{ matrix.topic }}
          path: test-results/reports/${{ matrix.topic }}.json
          retention-days: 30

  summary:
    name: Summary
    needs: tests
    if: always()
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Playwright JSON Reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: playwright-json-report-*
          path: test-results/reports
          merge-multiple: true

      - name: Add aggregate Playwright summary
        run: node scripts/playwright-summary.js aggregate --reports-dir test-results/reports
